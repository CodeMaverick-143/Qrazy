version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "client"
    commit-message:
      prefix: "deps: "

  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "server"
    commit-message:
      prefix: "deps: "

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
    commit-message:
      prefix: "ci: "
