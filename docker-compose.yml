version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=http://localhost:54321
        - VITE_SUPABASE_ANON_KEY=dummy-anon-key
        - VITE_API_URL=/api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://user:password@db:5432/qrazy?schema=public
      - DIRECT_URL=postgresql://user:password@db:5432/qrazy?schema=public
      - SUPABASE_URL=http://localhost:54321
      - SUPABASE_ANON_KEY=dummy-anon-key
      - SUPABASE_SERVICE_ROLE_KEY=dummy-service-role-key
      - MAIL_HOST=smtp.ethereal.email
      - MAIL_PORT=587
      - MAIL_USER=your_email
      - MAIL_PASS=your_password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - qrazy-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=qrazy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d qrazy" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qrazy-network

networks:
  qrazy-network:
    driver: bridge

volumes:
  postgres_data:
